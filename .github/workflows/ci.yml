name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
      - run: npm ci
      - name: Lint Firefox
        run: node scripts/prepare-manifest.js firefox && npx web-ext lint
      - name: Build Firefox
        run: node scripts/build.js firefox
      - name: Build Chrome
        run: node scripts/build.js chrome
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: extensions
          path: web-ext-artifacts/
